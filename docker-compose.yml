services:
  frontend:
    build:
      context: ./frontend
    container_name: nexus-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    depends_on: [backend]

  backend:
    build:
      context: ./backend
    container_name: nexus-backend
    restart: unless-stopped
    env_file:
      - ${NEXUS_ENV_FILE:-.env}
    expose: ["8080"]
